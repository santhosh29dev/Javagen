version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: postgres:16-alpinemysql:8mongo:7
    environment:
POSTGRES_DB: demo2_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretMYSQL_DATABASE: demo2_db
      MYSQL_ROOT_PASSWORD: secretMONGO_INITDB_DATABASE: demo2_db
    ports:
      - "5432:54323306:330627017:27017"
    volumes:
      - db-data:/var/lib/data

volumes:
  db-data:
